# Build the OctoChat desktop app for every OS/arch on a version tag and attach
# the installers to a GitHub Release.
#
# Trigger: push a tag like `v1.2.3`. (Manual `workflow_dispatch` runs build the
# artifacts too, but skip the Release step — handy for testing the pipeline.)
#
# electron-builder only builds for its HOST OS, so each OS is a separate runner:
#   - macos-14      → dmg + zip, arm64 AND x64 (npmRebuild:false → no native
#                     compile, electron-builder just downloads both prebuilts)
#   - windows-latest → nsis x64 (native, no wine)
#   - ubuntu-latest  → AppImage x64 (native, no docker)
# Targets/arches themselves are declared in apps/desktop/electron-builder.yml.
#
# Sync server URL is baked into the web bundle at export time and is REQUIRED:
# scripts/check-build-env.mjs fails the build if EXPO_PUBLIC_STARFISH_URL /
# EXPO_PUBLIC_STARFISH_NAMESPACE are unset. They come from repo variables with NO
# fallback — an unset var fails the tag build loudly instead of silently shipping
# a release pointed at the wrong server. Set them once in
#   Settings → Secrets and variables → Actions → Variables:
#     EXPO_PUBLIC_STARFISH_URL       e.g. https://dev-sync.drakkar.software/sync
#     EXPO_PUBLIC_STARFISH_NAMESPACE e.g. octochat
name: desktop-release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# One run per ref; a new push to the same tag cancels the older run.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-14, target: macos }
          - { os: windows-latest, target: windows }
          - { os: ubuntu-latest, target: linux }
    env:
      # Bake the sync server into the web bundle (no fallback — see header).
      EXPO_PUBLIC_STARFISH_URL: ${{ vars.EXPO_PUBLIC_STARFISH_URL }}
      EXPO_PUBLIC_STARFISH_NAMESPACE: ${{ vars.EXPO_PUBLIC_STARFISH_NAMESPACE }}
      # Pin electron / electron-builder caches to the workspace so the step below
      # can cache them uniformly across OSes (default locations differ per OS).
      ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron
      ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder
      # Don't let electron-builder grab a stray keychain identity on macOS; these
      # builds are intentionally unsigned (ad-hoc). No-op on Windows/Linux.
      CSC_IDENTITY_AUTO_DISCOVERY: false
    steps:
      - uses: actions/checkout@v4

      # Reads the pnpm version from package.json `packageManager`.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # ~500MB–1GB of electron prebuilts + builder tools per OS; cache them.
      # Keyed on the desktop package.json (electron / electron-builder versions).
      - name: Cache electron downloads
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/.cache/electron
            ${{ github.workspace }}/.cache/electron-builder
          key: ${{ runner.os }}-electron-${{ hashFiles('apps/desktop/package.json') }}
          restore-keys: ${{ runner.os }}-electron-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # `package` = check-build-env → expo export (web) → gen-update-manifest →
      # build:main (tsup) → electron-builder. No GH token here on purpose, so
      # electron-builder's on-tag publish can't fire — the release job publishes.
      - name: Package desktop app
        run: pnpm --filter @octochat/desktop package

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.target }}
          if-no-files-found: error
          retention-days: 7
          path: |
            apps/desktop/release/*.dmg
            apps/desktop/release/*.zip
            apps/desktop/release/*.exe
            apps/desktop/release/*.AppImage
            apps/desktop/release/*.blockmap
            apps/desktop/release/latest*.yml

  release:
    name: github release
    needs: build
    # Only publish on a real tag; workflow_dispatch just builds artifacts.
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all installers
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create / update release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: dist/**/*
